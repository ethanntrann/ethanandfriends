services:
  - type: web
    name: ethanandfriends
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SERPAPI_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: anthropic/claude-sonnet-4
